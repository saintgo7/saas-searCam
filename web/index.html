<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0A0A0F">
  <title>SearCam — 몰래카메라 탐지</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="phone-frame">
    <div id="app">

      <!-- ── Home Screen ── -->
      <div id="screen-home" class="screen active">
        <div class="home-header">
          <div class="logo-wrap">
            <svg class="logo-svg" viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="18" stroke="#00E5FF" stroke-width="2"/>
              <circle cx="20" cy="20" r="10" stroke="#00E5FF" stroke-width="1.5"/>
              <circle cx="20" cy="20" r="3" fill="#00E5FF"/>
              <line x1="20" y1="2" x2="20" y2="8" stroke="#00E5FF" stroke-width="1.5"/>
              <line x1="20" y1="32" x2="20" y2="38" stroke="#00E5FF" stroke-width="1.5"/>
              <line x1="2" y1="20" x2="8" y2="20" stroke="#00E5FF" stroke-width="1.5"/>
              <line x1="32" y1="20" x2="38" y2="20" stroke="#00E5FF" stroke-width="1.5"/>
            </svg>
            <span class="logo-text">SearCam</span>
          </div>
          <p class="tagline">스마트폰으로 30초 몰래카메라 스크리닝</p>
        </div>

        <div class="main-cta">
          <button id="btn-quick-scan" class="cta-btn pulse">
            <div class="cta-rings">
              <div class="ring r1"></div>
              <div class="ring r2"></div>
            </div>
            <svg class="cta-icon" viewBox="0 0 48 48">
              <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2" fill="none"/>
              <circle cx="24" cy="24" r="12" stroke="currentColor" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
              <circle cx="24" cy="24" r="4" fill="currentColor"/>
            </svg>
            <div class="cta-label">Quick Scan</div>
            <div class="cta-sub">Wi-Fi · 렌즈 · 자기장 · 30초</div>
          </button>
        </div>

        <div class="sub-grid">
          <button class="sub-btn" data-mode="lens">
            <span class="sub-icon">◉</span>
            <span class="sub-name">렌즈 찾기</span>
            <span class="sub-desc">카메라 반사</span>
          </button>
          <button class="sub-btn" data-mode="ir">
            <span class="sub-icon">☀</span>
            <span class="sub-name">IR 감지</span>
            <span class="sub-desc">적외선 탐지</span>
          </button>
          <button class="sub-btn" data-mode="emf">
            <span class="sub-icon">⚡</span>
            <span class="sub-name">자기장</span>
            <span class="sub-desc">EMF 분석</span>
          </button>
          <button class="sub-btn" data-mode="full">
            <span class="sub-icon">⊞</span>
            <span class="sub-name">Full Scan</span>
            <span class="sub-desc">전체 레이어</span>
          </button>
        </div>

        <div id="android-section">
          <div id="android-badge" style="display:none" class="android-badge"></div>
          <button id="btn-view-android" class="android-btn" style="display:none">
            📱 Android 스캔 결과 보기
          </button>
          <div id="android-waiting" class="android-waiting">
            <span class="waiting-dot"></span> Android 앱 스캔 대기 중...
          </div>
        </div>

        <p class="disclaimer">
          ※ 본 도구는 1차 스크리닝용입니다. 탐지되지 않아도 안전을 보장하지 않습니다.
        </p>
      </div>

      <!-- ── Scanning Screen ── -->
      <div id="screen-scan" class="screen">
        <div class="scan-header">
          <button id="btn-cancel" class="icon-btn">✕</button>
          <span class="scan-title">스캔 중</span>
          <div class="scan-timer" id="scan-timer">0s</div>
        </div>

        <!-- WiFi Layer -->
        <div class="layer-card" id="card-wifi" data-state="idle">
          <div class="layer-top">
            <div class="layer-icon-wrap wifi-color">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1.5 8.5a14 14 0 0 1 21 0"/>
                <path d="M5 12a10 10 0 0 1 14 0"/>
                <path d="M8.5 15.5a6 6 0 0 1 7 0"/>
                <circle cx="12" cy="19" r="1" fill="currentColor"/>
              </svg>
            </div>
            <div class="layer-meta">
              <div class="layer-name">Wi-Fi 네트워크</div>
              <div class="layer-status" id="wifi-status">대기 중</div>
            </div>
            <div class="layer-weight">50%</div>
            <div class="layer-check" id="wifi-check"></div>
          </div>
          <div class="layer-bar"><div class="layer-fill" id="wifi-fill"></div></div>
          <div class="layer-log" id="wifi-log"></div>
        </div>

        <!-- Lens Layer -->
        <div class="layer-card" id="card-lens" data-state="idle">
          <div class="layer-top">
            <div class="layer-icon-wrap lens-color">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="9"/>
                <circle cx="12" cy="12" r="4"/>
                <line x1="12" y1="3" x2="12" y2="1"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
              </svg>
            </div>
            <div class="layer-meta">
              <div class="layer-name">렌즈 감지 (Retroreflection)</div>
              <div class="layer-status" id="lens-status">대기 중</div>
            </div>
            <div class="layer-weight">20%</div>
            <div class="layer-check" id="lens-check"></div>
          </div>
          <div class="layer-bar"><div class="layer-fill" id="lens-fill"></div></div>
          <div id="camera-wrap" class="camera-wrap hidden">
            <video id="cam-video" autoplay playsinline muted></video>
            <canvas id="cam-canvas"></canvas>
            <div class="cam-scanline"></div>
            <div class="cam-label">카메라 활성 — 렌즈 반사 분석 중</div>
          </div>
          <div class="layer-log" id="lens-log"></div>
        </div>

        <!-- Magnetic Layer -->
        <div class="layer-card" id="card-mag" data-state="idle">
          <div class="layer-top">
            <div class="layer-icon-wrap mag-color">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 3v7a6 6 0 0 0 12 0V3"/>
                <line x1="6" y1="3" x2="6" y2="6"/>
                <line x1="18" y1="3" x2="18" y2="6"/>
              </svg>
            </div>
            <div class="layer-meta">
              <div class="layer-name">자기장 (EMF)</div>
              <div class="layer-status" id="mag-status">대기 중</div>
            </div>
            <div class="layer-weight">15%</div>
            <div class="layer-check" id="mag-check"></div>
          </div>
          <div class="layer-bar"><div class="layer-fill" id="mag-fill"></div></div>
          <div class="mag-meter" id="mag-meter">
            <div class="mag-bar-wrap">
              <div class="mag-bar-fill" id="mag-bar"></div>
              <div class="mag-needle" id="mag-needle"></div>
            </div>
            <div class="mag-reading" id="mag-reading">-- µT</div>
          </div>
          <div class="layer-log" id="mag-log"></div>
        </div>

        <div class="scan-footer">
          <div class="scan-overall-label" id="scan-phase">초기화 중...</div>
          <div class="scan-overall-bar">
            <div class="scan-overall-fill" id="scan-overall"></div>
          </div>
        </div>
      </div>

      <!-- ── Result Screen ── -->
      <div id="screen-result" class="screen">
        <div class="result-header">
          <button id="btn-home" class="icon-btn">←</button>
          <span class="result-title">스캔 결과</span>
          <div></div>
        </div>

        <div class="score-card" id="score-card">
          <div class="score-ring-wrap">
            <svg class="score-ring" viewBox="0 0 120 120">
              <circle cx="60" cy="60" r="50" fill="none" stroke="#1C1C28" stroke-width="8"/>
              <circle cx="60" cy="60" r="50" fill="none" stroke-width="8"
                      stroke-dasharray="314" stroke-dashoffset="314"
                      stroke-linecap="round" id="score-arc"
                      transform="rotate(-90 60 60)"/>
            </svg>
            <div class="score-inner">
              <div class="score-num" id="score-num">0</div>
              <div class="score-unit">/100</div>
            </div>
          </div>
          <div class="score-info">
            <div class="score-level" id="score-level">SAFE</div>
            <div class="score-label-ko" id="score-label-ko">안전</div>
            <div class="score-desc" id="score-desc">탐지된 위협 없음</div>
          </div>
        </div>

        <div class="correction-row" id="correction-row"></div>

        <div class="result-layers" id="result-layers"></div>

        <div class="result-devices" id="result-devices"></div>

        <div class="result-actions">
          <p class="result-disclaimer">
            이 결과는 1차 스크리닝입니다. 의심될 경우 전문가 정밀 검사를 권장합니다.
          </p>
          <button id="btn-rescan" class="rescan-btn">다시 스캔</button>
        </div>
      </div>

    </div><!-- #app -->
  </div><!-- #phone-frame -->

  <script src="app.js"></script>
</body>
</html>
